services:
  postgres:
    image: postgres:16
    container_name: ai_oi_coach_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_oi_coach
    ports:
      - "5432:5432"
    volumes:
      - ai_oi_coach_pg_data:/var/lib/postgresql/data

volumes:
  ai_oi_coach_pg_data:
